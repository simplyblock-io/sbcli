apiVersion: v1
kind: Service
metadata:
  name: simplyblock-webappapi
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: simplyblock-webappapi
  ports:
  - name: http
    port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: simplyblock-controlcenter
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: simplyblock-controlcenter
  ports:
  - name: http
    port: 443
    targetPort: 443
